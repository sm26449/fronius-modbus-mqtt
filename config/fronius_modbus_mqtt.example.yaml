# Fronius Modbus MQTT Configuration
# ==================================
# Copy this file to fronius_modbus_mqtt.yaml and adjust values

general:
  log_level: INFO              # DEBUG, INFO, WARNING, ERROR
  log_file: "/app/logs/fronius.log"  # Log file path (becomes inverter.log or meter.log)
  poll_interval: 5             # Seconds between polling cycles
  publish_mode: changed        # 'changed' = only publish changes, 'all' = always publish

# Modbus TCP Connection
# ---------------------
modbus:
  host: 192.168.1.100          # Fronius DataManager IP address
  port: 502                    # Modbus TCP port (standard)
  timeout: 3                   # Connection timeout in seconds (Fronius needs 2-3s)
  retry_attempts: 3            # Retries on read failure
  retry_delay: 0.5             # Seconds between retries
  # Night/Sleep Mode Settings (DataManager enters sleep mode at night)
  night_mode_enabled: true     # Enable sleep mode detection
  night_poll_interval: 300     # Poll interval during sleep mode (5 min)
  night_start_hour: 21         # Night starts at 21:00
  night_end_hour: 6            # Night ends at 06:00
  ping_check_enabled: true     # Check if host responds to ping before connecting
  consecutive_failures_for_sleep: 3  # Enter sleep mode after N consecutive failures
  night_skip_inverters: true   # Skip inverter polling at night (meters still polled)
                               # DataManager returns stale/corrupted data from sleeping inverters

# Device Configuration
# --------------------
# Single poller thread cycles through all devices sequentially
devices:
  inverters: [1]               # Inverter Modbus IDs (typically 1-4)
  meters: [240]                # Smart Meter Modbus ID (typically 240)
  meter_poll_interval: 2       # (unused - kept for compatibility)
  inverter_poll_delay: 3       # Delay between device reads in seconds (3s reduces DataManager pressure)
  inverter_read_delay_ms: 500  # Delay between register block reads within same inverter (500ms)

# MQTT Configuration
# ------------------
mqtt:
  enabled: true
  broker: 192.168.1.100        # MQTT broker address
  port: 1883                   # MQTT port
  username: ""                 # Leave empty if no auth
  password: ""
  topic_prefix: fronius        # Topics: fronius/inverter/{id}/...
  retain: true                 # Retain last value on broker
  qos: 0                       # QoS level (0, 1, or 2)
  # TLS settings (optional - requires broker configured with TLS)
  # tls_enabled: false
  # tls_ca_certs: ""           # Path to CA certificate file
  # tls_certfile: ""           # Path to client certificate file
  # tls_keyfile: ""            # Path to client private key file
  # tls_insecure: false        # Skip hostname verification (for IP-based connections)

# InfluxDB Configuration (Optional)
# ----------------------------------
influxdb:
  enabled: false
  url: http://influxdb:8086   # Use container name when running in Docker
  token: ""                    # InfluxDB API token
  org: ""                      # Organization name
  bucket: fronius              # Bucket name
  write_interval: 5            # Minimum seconds between writes per device
  publish_mode: changed        # 'changed' = only publish changes, 'all' = always publish
  # TLS settings (optional - requires InfluxDB configured with TLS)
  # verify_ssl: true           # Verify SSL certificates
  # ssl_ca_cert: ""            # Path to CA certificate file

# Power Limit Control (CAUTION — writes to inverter registers)
# -----------------------------------------------------------
# Enables Modbus TCP write to SunSpec Model 123 (Immediate Controls).
# Commands are sent via MQTT: fronius/inverter/{id}/cmd/set_power_limit
# Results published to: fronius/inverter/{id}/cmd/result
# write:
#   enabled: false                # Must explicitly enable (default: disabled)
#   min_power_limit_pct: 10       # Safety floor: never limit below 10%
#   max_power_limit_pct: 100      # Safety ceiling
#   rate_limit_seconds: 30        # Min time between writes per device
#   auto_revert_seconds: 3600     # Auto-restore 100% after 1h (0=disabled)
#   stabilization_delay: 2.0      # Wait after write before next read (DataManager needs time)

# Debug & Data Validation
# -----------------------
# DataManager buffer corruption detection and diagnostic logging.
# The Fronius DataManager TCP server has a known buffer retention issue where
# Model 103 registers return stale/zero data while MPPT Model 160 data remains correct.
# When enabled, corrupted reads are detected and reconciled using MPPT as ground truth.
debug:
  validate_data: true          # Enable buffer corruption detection + reconciliation (recommended)
  log_register_values: false   # Log raw register hex values per read (very verbose)
  log_scale_factors: false     # Log scale factor calculations (very verbose)
  log_reconciliation: true     # Log corruption detection + reconciliation (WARNING level)
  log_publish_data: false      # Log full data dict before publish (very verbose)
  log_status_transitions: true # Log inverter status changes, e.g. MPPT→FAULT (WARNING level)
